<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4BHRZ36FYN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4BHRZ36FYN');

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Class Booking Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/jli2vln.css">
  <!-- Assuming Proxima Nova from Typekit or similar, or fallbacks -->
  <style>
    :root {
      --accent: #e11d48;
      /* red */
      --border: #e2e8f0;
      /* gray-200 */
      --text: #0f172a;
      /* gray-900 */
      --muted: #64748b;
      /* gray-500 */
    }

    body {
      font-family: 'Noto Sans JP', 'Proxima Nova', sans-serif;
      color: var(--text);
    }

    form {
      max-width: 720px;
      margin: 24px auto;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    h2 {
      margin: 0 0 12px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .two {
      grid-template-columns: 1fr 1fr;
    }

    label {
      font-weight: 600;
      margin-top: 8px;
      display: block;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      background-color: #f5f5f5;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: 'Proxima Nova', 'Noto Sans JP', sans-serif;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--accent);
    }

    textarea {
      resize: vertical;
    }

    hr {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* Session picker */
    .picker-wrap {
      margin-top: 8px;
    }

    .picker-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      border: none;
      background: #f3f4f6;
      color: var(--text);
      font-size: 20px;
      border-radius: 6px;
      width: 36px;
      height: 36px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: #e5e7eb;
    }

    .count {
      font-size: 14px;
      color: var(--muted);
    }

    .sessions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .session-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      background: white;
      transition: background .15s ease, border-color .15s ease;
      width: 100%;
      text-align: left;
    }

    .session-btn:hover {
      border-color: #d1d5db;
    }

    .session-btn[aria-checked="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .session-btn[aria-checked="true"] .meta {
      color: #ffe4e6;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: #fff;
      width: 100%;
      font-size: 16px;
    }

    .btn:hover {
      background: #0b1220;
    }

    /* Apple Pay Button */
    #apple-pay-button {
      height: 48px;
      width: 100%;
      display: inline-block;
      -webkit-appearance: -apple-pay-button;
      appearance: -apple-pay-button;
      -apple-pay-button-type: plain;
      -apple-pay-button-style: black;
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .two {
        grid-template-columns: 1fr;
      }
    }

    /* Steps */
    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    /* Summary */
    .summary-box {
      background: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .summary-item label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 4px 0;
    }

    .summary-item div {
      font-weight: 600;
      font-size: 15px;
    }

    /* Payment Methods */
    .payment-label {
      margin-bottom: 8px;
      display: block;
      font-weight: 600;
    }

    .payment-methods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .pm-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .pm-card:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .pm-card.selected {
      border-color: var(--accent);
      background: #fff1f2;
      color: var(--accent);
    }

    /* Payment Forms */
    .pm-details {
      display: none;
      margin-bottom: 24px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .pm-details.active {
      display: block;
    }

    .cc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .full {
      grid-column: span 2;
    }

    .gpay-btn,
    .apple-btn {
      width: 100%;
      padding: 12px;
      border-radius: 4px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
    }

    .gpay-btn {
      background: #000;
      color: #fff;
    }

    /* Placeholder style */
    .apple-btn {
      background: #000;
      color: #fff;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      flex: 1;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn-primary {
      flex: 2;
    }
  </style>
  <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
</head>

<body>

  <form id="booking-form">
    <h2>Class Booking Form</h2>

    <!-- STEP 1: INFO & CLASS -->
    <div id="step-1" class="step active">
      <div class="grid two">
        <div><label>姓 (Last Name)*</label><input type="text" name="last_name" required></div>
        <div><label>名 (First Name)*</label><input type="text" name="first_name" required></div>
        <div><label>セイ</label><input type="text" name="sei"></div>
        <div><label>メイ</label><input type="text" name="mei"></div>
        <div><label>国籍 (Country)*</label><input type="text" name="country" required></div>
        <div><label>郵便番号 (Postal Code)*</label><input type="text" name="postal_code" required></div>
        <div><label>住所 (Address)*</label><input type="text" name="address" required></div>
        <div><label>電話番号 (Phone Number)*</label><input type="tel" name="phone" required></div>
        <div><label>メール (Email)*</label><input type="email" name="email" required></div>
        <div><label>生年月日 (Date of Birth)*</label><input type="date" name="dob" required></div>
        <div>
          <label>性別 (Sex)*</label>
          <select name="sex" required>
            <option value="">-- Select --</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div><label>備考欄 (Notes)</label><textarea name="notes" rows="3"></textarea></div>
      </div>

      <hr>

      <h3>Choose Your Class</h3>
      <p class="meta">Showing 6 classes at a time (from the next 26 available).</p>

      <input type="hidden" name="class_iso" id="class_iso" />
      <input type="hidden" name="class_display" id="class_display" />
      <input type="hidden" name="class_date" id="class_date" />
      <input type="hidden" name="class_time" id="class_time" />
      <input class="sr-only" id="class_required" required aria-hidden="true" />

      <div class="picker-wrap">
        <div class="picker-toolbar">
          <button type="button" id="prevBtn" class="nav-btn" title="Previous">←</button>
          <div class="count" id="count"></div>
          <button type="button" id="nextBtn" class="nav-btn" title="Next">→</button>
        </div>
        <div class="sessions" id="sessions"></div>
      </div>

      <div style="margin-top:24px;">
        <button type="button" id="next-step-btn" class="btn">Next</button>
      </div>
    </div>

    <!-- STEP 2: CONFIRM & PAY -->
    <div id="step-2" class="step">
      <h3>Confirm Details</h3>
      <div class="summary-box">
        <div class="summary-grid" id="summary-content">
          <!-- Populated by JS -->
        </div>
      </div>

      <h3>Payment Method</h3>
      <div class="payment-methods">
        <div class="pm-card selected" onclick="selectPayment('card')">
          <span>Credit Card</span>
        </div>
        <div class="pm-card" onclick="selectPayment('gpay')">
          <span>Google Pay</span>
        </div>
        <div class="pm-card" onclick="selectPayment('apple')">
          <span>Apple Pay</span>
        </div>
      </div>

      <!-- Credit Card Form -->
      <div id="pm-card" class="pm-details active">
        <div id="card-container"></div>
      </div>

      <!-- Google Pay Placeholder -->
      <div id="pm-gpay" class="pm-details">
        <p style="margin-bottom:12px; color:var(--muted);">Complete payment with Google Pay.</p>
        <div id="google-pay-button"></div>
      </div>

      <!-- Apple Pay Placeholder -->
      <div id="pm-apple" class="pm-details">
        <p style="margin-bottom:12px; color:var(--muted);">Complete payment with Apple Pay.</p>
        <div id="apple-pay-wrapper"><button type="button" id="apple-pay-button"></button></div>
      </div>

      <div class="actions">
        <button type="button" id="back-btn" class="btn btn-secondary btn">Back</button>
        <button type="submit" id="submit-btn" class="btn btn-primary btn">Pay & Book</button>
      </div>
    </div>

  </form>

  <script>
    (async function () {
      const SCHEDULE = [
        [3, 19, 0],   // Wednesday 7:00 PM
        [5, 10, 0],   // Friday 10:00 AM
        [6, 17, 30],  // Saturday 5:30 PM
      ];

      const WINDOW_DAYS = 90;
      const DISPLAY_COUNT = 6;
      const MAX_CLASSES = 26;

      const BLACKOUT_DATES = [
        // '2025-12-24', '2025-12-31'
      ];
      const REPLACEMENTS = {
        // '2025-12-27T17:30': '2025-12-28T15:00'
      };
      const ADDITIONAL_SESSIONS = [
        // '2025-12-29T19:00'
      ];

      // Square SDK Init: Fetch config from backend
      let payments, card, googlePay;

      try {
        if (!window.Square) {
          throw new Error('Square SDK failed to load');
        }

        // Fetch credentials
        const configRes = await fetch('/api/square/config');
        if (!configRes.ok) throw new Error('Failed to load Square config');
        const { appId, locationId } = await configRes.json();

        if (!appId || !locationId) throw new Error('Missing Square credentials');

        payments = window.Square.payments(appId, locationId);

        // Card Init
        card = await payments.card();
        await card.attach('#card-container');

        // Google Pay Init
        const paymentRequest = payments.paymentRequest({
          countryCode: 'JP',
          currencyCode: 'JPY',
          total: {
            amount: '4500',
            label: 'Total',
          },
        });
        googlePay = await payments.googlePay(paymentRequest);
        await googlePay.attach('#google-pay-button');

        // Google Pay Event Listener
        const googlePayButton = document.getElementById('google-pay-button');
        googlePayButton.addEventListener('click', async () => {
          // We tokenize then submit
          try {
            const tokenResult = await googlePay.tokenize();
            if (tokenResult.status === 'OK') {
              await submitBooking(tokenResult.token);
            } else {
              throw new Error(`Tokenization failed: ${tokenResult.status}`);
            }
          } catch (e) {
            console.error(e);
            alert("Google Pay failed: " + e.message);
          }
        });

        // Apple Pay Init
        let applePay;
        try {
          applePay = await payments.applePay(paymentRequest);
          // No attach needed for Apple Pay
        } catch (e) {
          const applePayWrapper = document.getElementById('apple-pay-wrapper');
          if (e.name === "PaymentMethodUnsupportedError") {
            applePayWrapper.innerHTML = `<p style="color:red">Apple Pay is unsupported for this browser/device.</p>`;
            // Possibly hide the Apple Pay selection via JS if desired
          } else {
            console.error(e);
            applePayWrapper.innerHTML = `<p style="color:red">Failed to initialize Apple Pay: ${e.message}</p>`;
          }
        }

        // Apple Pay Event Listener
        if (applePay) {
          const applePayButton = document.getElementById('apple-pay-button');
          applePayButton.addEventListener('click', async () => {
            try {
              const tokenResult = await applePay.tokenize();
              if (tokenResult.status === 'OK') {
                await submitBooking(tokenResult.token);
              } else {
                throw new Error(`Tokenization failed: ${tokenResult.status}`);
              }
            } catch (e) {
              console.error(e);
              alert("Apple Pay failed: " + e.message);
            }
          });
        }

      } catch (e) {
        console.error("Initializing Square failed", e);
      }

      const sessionsEl = document.getElementById('sessions');
      const countEl = document.getElementById('count');
      const hiddenISO = document.getElementById('class_iso');
      const hiddenDisplay = document.getElementById('class_display');
      const hiddenDate = document.getElementById('class_date');
      const hiddenTime = document.getElementById('class_time');
      const requiredGhost = document.getElementById('class_required');

      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      let page = 0;
      let list = [];

      function pad(n) { return n.toString().padStart(2, '0'); }
      function ordinal(n) { const s = ["th", "st", "nd", "rd"], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }
      function fmtDisplay(dt) {
        const day = dt.toLocaleDateString(undefined, { weekday: 'long' });
        const month = dt.toLocaleDateString(undefined, { month: 'long' });
        const dom = ordinal(dt.getDate());
        const time = dt.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        return `${day} ${month} ${dom}, ${time}`;
      }
      function toISOLocal(dt) { return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`; }
      function toDateOnly(dt) { return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}`; }
      function toTime12h(dt) { return dt.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: true }); }

      function nextOccurrence(start, weekday, hour, minute) {
        const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate(), hour, minute, 0, 0);
        const diff = (weekday - dt.getDay() + 7) % 7;
        if (diff > 0) dt.setDate(dt.getDate() + diff);
        if (diff === 0 && dt < start) dt.setDate(dt.getDate() + 7);
        return dt;
      }

      function* baseSessions(from, days, schedule) {
        const until = new Date(from);
        until.setDate(until.getDate() + days);
        const cursors = schedule.map(([wd, h, m]) => nextOccurrence(from, wd, h, m));

        while (true) {
          let idx = -1, min = null;
          for (let i = 0; i < cursors.length; i++) {
            const d = cursors[i];
            if (d < until && (min === null || d < min)) { min = d; idx = i; }
          }
          if (idx === -1) return;
          yield new Date(cursors[idx]);
          cursors[idx].setDate(cursors[idx].getDate() + 7);
        }
      }

      function applyOverrides(candidateDates, from, days) {
        const until = new Date(from); until.setDate(until.getDate() + days);
        const replaced = [];
        for (const dt of candidateDates) {
          const iso = toISOLocal(dt);
          if (REPLACEMENTS[iso]) {
            const repl = new Date(REPLACEMENTS[iso].replace(' ', 'T'));
            if (repl >= from && repl < until && !BLACKOUT_DATES.includes(toDateOnly(repl))) replaced.push(repl);
          } else {
            replaced.push(dt);
          }
        }
        for (const iso of ADDITIONAL_SESSIONS) {
          const extra = new Date(iso.replace(' ', 'T'));
          if (extra >= from && extra < until && !BLACKOUT_DATES.includes(toDateOnly(extra))) replaced.push(extra);
        }
        return Array.from(new Map(replaced.map(d => [toISOLocal(d), d])).values())
          .filter(d => !BLACKOUT_DATES.includes(toDateOnly(d)))
          .sort((a, b) => a - b);
      }

      function renderPage() {
        const start = page * DISPLAY_COUNT;
        const items = list.slice(start, start + DISPLAY_COUNT);
        sessionsEl.innerHTML = '';
        const frag = document.createDocumentFragment();
        items.forEach((dt, i) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'session-btn';
          btn.setAttribute('role', 'radio');
          btn.setAttribute('aria-checked', 'false');
          btn.dataset.iso = toISOLocal(dt);
          btn.dataset.date = toDateOnly(dt);
          btn.dataset.time = toTime12h(dt);
          btn.innerHTML = `<span>${fmtDisplay(dt)}</span><span class="meta">${dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}</span>`;
          btn.addEventListener('click', () => selectSession(btn));
          frag.appendChild(btn);
        });
        sessionsEl.appendChild(frag);
        countEl.textContent = `Page ${page + 1} of ${Math.ceil(list.length / DISPLAY_COUNT)}`;
        prevBtn.disabled = page === 0;
        nextBtn.disabled = start + DISPLAY_COUNT >= list.length;
      }

      function selectSession(btn) {
        sessionsEl.querySelectorAll('.session-btn[aria-checked="true"]').forEach(el => el.setAttribute('aria-checked', 'false'));
        btn.setAttribute('aria-checked', 'true');
        hiddenISO.value = btn.dataset.iso;
        hiddenDisplay.value = btn.textContent.trim();
        hiddenDate.value = btn.dataset.date;
        hiddenTime.value = btn.dataset.time;
        requiredGhost.value = 'selected';
      }

      prevBtn.addEventListener('click', () => { if (page > 0) { page--; renderPage(); } });
      nextBtn.addEventListener('click', () => { if ((page + 1) * DISPLAY_COUNT < list.length) { page++; renderPage(); } });

      const bookingForm = document.getElementById('booking-form');
      const submitBtn = document.getElementById('submit-btn');
      const nextStepBtn = document.getElementById('next-step-btn');
      const backBtn = document.getElementById('back-btn');
      const step1 = document.getElementById('step-1');
      const step2 = document.getElementById('step-2');
      const summaryContent = document.getElementById('summary-content');

      let selectedPaymentMethod = 'card';

      // Payment UI Logic
      window.selectPayment = function (method) {
        selectedPaymentMethod = method;
        // Update tabs
        document.querySelectorAll('.pm-card').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');

        // Update forms
        document.querySelectorAll('.pm-details').forEach(el => el.classList.remove('active'));
        document.getElementById('pm-' + method).classList.add('active');

        // Toggle Main Submit Button (Hidden for GPay/ApplePay usually, but here we only implement GPay special flow)
        if (selectedPaymentMethod === 'gpay' || selectedPaymentMethod === 'apple') {
          submitBtn.style.display = 'none';
        } else {
          submitBtn.style.display = 'block';
        }
      };

      // Navigation Logic
      nextStepBtn.addEventListener('click', () => {
        // Validate Step 1
        if (!hiddenISO.value) {
          requiredGhost.reportValidity();
          return;
        }
        if (!bookingForm.checkValidity()) {
          bookingForm.reportValidity();
          return;
        }

        // Populate Summary
        const fd = new FormData(bookingForm);
        summaryContent.innerHTML = `
          <div class="summary-item"><label>Name</label><div>${fd.get('last_name')} ${fd.get('first_name')}</div></div>
          <div class="summary-item"><label>Class</label><div>${hiddenDisplay.value}</div></div>
          <div class="summary-item"><label>Phone</label><div>${fd.get('phone')}</div></div>
          <div class="summary-item"><label>Email</label><div>${fd.get('email') || '-'}</div></div>
          <div class="summary-item"><label>Address</label><div>${fd.get('address')}</div></div>
          <div class="summary-item"><label>Notes</label><div>${fd.get('notes') || '-'}</div></div>
        `;

        // Switch Step
        step1.classList.remove('active');
        step2.classList.add('active');
        window.scrollTo(0, 0);
      });

      backBtn.addEventListener('click', () => {
        step2.classList.remove('active');
        step1.classList.add('active');
        window.scrollTo(0, 0);
      });

      // Reusable Submission Logic
      async function submitBooking(sourceId) {
        // UI Feedback
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing...";

        try {
          const formData = new FormData(bookingForm);
          const jsonData = Object.fromEntries(formData.entries());

          // Add specific fields
          jsonData.booking_type = 'hyrox';
          jsonData.class_iso = hiddenISO.value;
          jsonData.class_display = hiddenDisplay.value;
          jsonData.class_date = hiddenDate.value;
          jsonData.class_time = hiddenTime.value;
          jsonData.payment_method = selectedPaymentMethod;

          if (sourceId) {
            jsonData.sourceId = sourceId;
          }

          // Redirect URL
          jsonData.redirectUrl = window.location.href;

          const res = await fetch('/api/square/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(jsonData)
          });

          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.message || "Server error");
          }

          const { checkoutUrl } = await res.json();
          if (checkoutUrl) {
            window.location.href = checkoutUrl;
          } else {
            alert("Booking Successful!");
            window.location.reload();
          }

        } catch (err) {
          console.error(err);
          alert("Booking failed: " + err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;

          // Should also re-enable GPay button logic if needed, but it's not disabled via DOM button
        }
      }

      bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Already validated in Step 1, but safe to check
        if (!hiddenISO.value || !bookingForm.checkValidity()) {
          step2.classList.remove('active');
          step1.classList.add('active');
          bookingForm.reportValidity();
          return;
        }

        try {
          // Tokenize if Card
          if (selectedPaymentMethod === 'card') {
            if (!card) throw new Error("Square Card not valid");
            const result = await card.tokenize();
            if (result.status === 'OK') {
              await submitBooking(result.token);
            } else {
              throw new Error(`Tokenization failed: ${result.errors ? JSON.stringify(result.errors) : result.status}`);
            }
          } else {
            // For other methods that might use the main button (Apple Pay placeholder?)
            // Or if we default to submitBooking without token for some reason
            await submitBooking(null);
          }

        } catch (err) {
          console.error(err);
          alert("Booking failed: " + err.message);
        }
      });

      function init() {
        const now = new Date();
        const base = Array.from(baseSessions(now, WINDOW_DAYS, SCHEDULE));
        list = applyOverrides(base, now, WINDOW_DAYS).slice(0, MAX_CLASSES);
        renderPage();
      }

      init();
    })();
  </script>
  <script defer src="assets/js/scrollin.js"></script>
</body>

</html>
